<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>City Group – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="tylesheet"/>
  </head>
<body>

  <div class="card">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">🏙️</div>
        <span class="brand-name">City Group</span>
      </div>
      <p class="brand-tagline">Building Digital Cities, One Line of Code at a Time.</p>
    </div>

    <div class="divider"></div>

    <h2 class="form-title">Create account</h2>
    <p class="form-subtitle">Join City Group and start building today</p>

    <div class="field">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" placeholder="John Doe" />
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />
      <span class="password-hint">At least 8 characters</span>
    </div>

    <div class="field">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••" />
    </div>

    <div class="terms">
      <input type="checkbox" id="terms" />
      <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
    </div>

    <button class="btn-primary">Create Account</button>

    <p class="login-link">
      Already have an account? <a href="login.html">Sign in</a>
    </p>
  </div>

</body>
  </html>
