<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>City Group – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="tylesheet"/>
 <style>
   *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(168,85,247,0.22) 0%, transparent 70%);
      top: -100px; right: -100px;
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      border-radius: 50%;
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 40px 32px;
      position: relative;
      z-index: 1;
    }

    .brand {
      margin-bottom: 32px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .brand-tagline {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.2px;
    }

    .form-title {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .form-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 28px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input::placeholder { color: rgba(255,255,255,0.2); }

    input:focus {
      border-color: rgba(168,85,247,0.7);
      background: rgba(168,85,247,0.08);
    }

    .password-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      margin-top: 6px;
    }

    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 22px;
      margin-top: 4px;
    }

    .terms input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #a855f7;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .terms span {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      line-height: 1.5;
    }

    .terms a {
      color: #818cf8;
      text-decoration: none;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .login-link {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
    }

    .login-link a {
      color: #818cf8;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover { color: #a5b4fc; }
 </style>
</head>
<body>

  <div class="card">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">🏙️</div>
        <span class="brand-name">City Group</span>
      </div>
      <p class="brand-tagline">Building Digital Cities, One Line of Code at a Time.</p>
    </div>

    <div class="divider"></div>

    <h2 class="form-title">Create account</h2>
    <p class="form-subtitle">Join City Group and start building today</p>

    <div class="field">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" placeholder="John Doe" />
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />
      <span class="password-hint">At least 8 characters</span>
    </div>

    <div class="field">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••" />
    </div>

    <div class="terms">
      <input type="checkbox" id="terms" />
      <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
    </div>

    <button class="btn-primary">Create Account</button>

    <p class="login-link">
      Already have an account? <a href="login.html">Sign in</a>
    </p>
  </div>

</body>
  </html>
